services:
  exporter:
    build: .
    container_name: export-requester
    working_dir: /app
    environment:
      HEADLESS: "true"
      CHATGPT_BASE_URL: "https://chatgpt.com"
      CLAUDE_BASE_URL: "https://claude.ai"
      LOG_DIR: "/app/logs"
      SCREENSHOT_DIR: "/app/screenshots"
      REQUEST_TIMEOUT_MS: "30000"
    volumes:
      - ./profile:/app/profile
      - ./claude-profile:/app/claude-profile
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
